infmax_models:
  # ##### ##### ##### ##### ##### ##### ##### ##### ##### centrality based
  - name: "degree"
    class: "CentralityChoice"
    parameters:
      nb_seeds: "auto"
      centrality: "degree"
  - name: "betweenness"
    class: "CentralityChoice"
    parameters:
      nb_seeds: "auto"
      centrality: "betweenness"
  - name: "closeness"
    class: "CentralityChoice"
    parameters:
      nb_seeds: "auto"
      centrality: "closeness"
  - name: "core_number"
    class: "CentralityChoice"
    parameters:
      nb_seeds: "auto"
      centrality: "core_number"
  - name: "neighbourhood_size"
    class: "CentralityChoice"
    parameters:
      nb_seeds: "auto"
      centrality: "neighbourhood_size"
  - name: "voterank"
    class: "CentralityChoice"
    parameters:
      nb_seeds: "auto"
      centrality: "voterank"
  # ##### ##### ##### ##### ##### ##### ##### ##### ##### ground truth
  - name: "gt_absoulute"
    class: "GroundTruth"
    parameters:
      average_protocol: True
      average_p_value: True
  - name: "gt_avg_proto"
    class: "GroundTruth"
    parameters:
      average_protocol: False
      average_p_value: True
  # ##### ##### ##### ##### ##### ##### ##### ##### ##### random
  - name: "random_choice"
    class: "RandomChoice"
    parameters:
      nb_seeds: "auto"
